---
- name: Prepare
  hosts: all
  gather_facts: false
  tasks:
    - name: Collect only os_family facts
      ansible.builtin.setup:
        gather_subset:
          - '!all'
          - os_family
    - name: Install RedHat packages
      ansible.builtin.dnf:
        name: "{{ item }}"
        state: present
      loop:
        - openssh-server
      when: ansible_facts['os_family'] == "RedHat"
    - name: Install Debian packages
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
        update_cache: true
      loop:
        - openssh-server
      when: ansible_facts['os_family'] == "Debian"

    - name: Start SSH service (RedHat)
      ansible.builtin.systemd:
        name: sshd
        state: started
        enabled: false
      when: ansible_facts['os_family'] == "RedHat"
      ignore_errors: yes

    - name: Start SSH service (Debian)
      ansible.builtin.systemd:
        name: ssh
        state: started
        enabled: false
      when: ansible_facts['os_family'] == "Debian"
      ignore_errors: yes

    - name: Ensure wheel group exists
      ansible.builtin.group:
        name: wheel
        state: present

    - name: Create test user
      ansible.builtin.user:
        name: test_user
        create_home: true
    - name: Generate an OpenSSH keypair
      community.crypto.openssh_keypair:
        path: "/tmp/{{ item }}"
      loop:
        - id_rsa
        - test_ansible_id_rsa
      delegate_to: localhost
