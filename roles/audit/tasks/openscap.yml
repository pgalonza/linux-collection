---
# tasks file for OpenSCAP integration

- name: Install OpenSCAP packages (RedHat)
  ansible.builtin.package:
    name:
      - openscap-scanner
      - scap-security-guide
    state: present
  when: ansible_facts['os_family'] == "RedHat"

- name: Install OpenSCAP packages (Debian)
  ansible.builtin.package:
    name:
      - openscap-scanner
      - ssg-base
      - ssg-debian
      - ssg-debderived
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: Create OpenSCAP report directory on target
  ansible.builtin.file:
    path: "{{ openscap_report_dir }}"
    state: directory
    mode: '0755'

- name: Run OpenSCAP CIS scan (HTML report)
  ansible.builtin.command:
    cmd: >
      oscap xccdf eval
      --profile xccdf_org.ssgproject.content_profile_cis
      --results {{ openscap_report_dir }}/results.xml
      --report {{ openscap_report_dir }}/report.html
      --fetch-remote-resources
      /usr/share/xml/scap/ssg/content/ssg-{{ ansible_facts['distribution']|lower }}{{ ansible_facts['distribution_major_version'] }}-ds.xml
  changed_when: false
  register: openscap_scan
  failed_when: openscap_scan.rc == 1 # Allow rc=1 (scan completed with failures)

- name: Report permissions
  ansible.builtin.file:
    path: "{{ item }}"
    state: file
    mode: '0644'
  loop:
    - "{{ openscap_report_dir }}/report.html"
    - "{{ openscap_report_dir }}/results.xml"

- name: Fetch OpenSCAP HTML report
  become: false
  ansible.builtin.fetch:
    src: "{{ openscap_report_dir }}/report.html"
    dest: "{{ audit_dir }}/report.html"
    flat: yes
    mode: '0600'

- name: Fetch OpenSCAP XML results
  become: false
  ansible.builtin.fetch:
    src: "{{ openscap_report_dir }}/results.xml"
    dest: "{{ audit_dir }}/results.xml"
    flat: yes
    mode: '0600'
