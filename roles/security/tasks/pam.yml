---
# tasks file for PAM

- name: PAM wheel
  community.general.pamd:
    name: su
    type: auth
    control: sufficient
    module_path: pam_rootok.so
    new_type: auth
    new_control: required
    new_module_path: pam_wheel.so
    module_arguments: 'use_uid'
    state: after

- name: Ensure group "wheel" exists
  ansible.builtin.group:
    name: wheel
    system: true
    state: present

- name: Add users to wheel group
  ansible.builtin.user:
    name: "{{ item }}"
    append: true
    groups:
      - wheel
  loop: "{{ pam_wheel_users }}"

- name: Ensure nullok is removed from /etc/pam.d/system-auth
  ansible.builtin.lineinfile:
    path: /etc/pam.d/system-auth
    regexp: '^\s*.*nullok\b'
    state: absent

- name: Ensure nullok is removed from /etc/pam.d/password-auth
  ansible.builtin.lineinfile:
    path: /etc/pam.d/password-auth
    regexp: '^\s*.*nullok\b'
    state: absent
