---
# defaults file for security

# SSHD
sshd_log_level: VERBOSE
sshd_port: 22
sshd_address_family: any
sshd_login_grace_time: 1m
sshd_max_auth_tries: 3
sshd_max_sessions: 10
sshd_allow_agent_forwarding: 'yes'
sshd_allow_tcp_forwarding: 'yes'
sshd_x11_forwarding: 'no'
sshd_print_motd: 'no'
sshd_tcp_keep_alive: 'yes'
sshd_client_alive_interval: 300
sshd_client_alive_count_max: 3
sshd_use_dns: 'no'
sshd_max_startups: 10:30:60
sshd_allow_users:
  - "{{ ansible_user }}"
sshd_sftp_server_path: /usr/libexec/openssh/sftp-server
sshd_listen_address_ipv4: '0.0.0.0'
sshd_listen_address_ipv6: '::'
sshd_deny_users:
  - root
  - admin
  - sa

# Crowdsec
crowdsec_use_wal: 'true'
crowdsec_whitelist:
  name: external/whitelists
  description: "Whitelist events from global addresses"
  whitelist:
    reason: "global ipv4/ipv6 ip/ranges"
    ip: []
    cidr: []
crowdsec_in_docker: true
crowdsec_version: 1.7.8
crowdsec_firewall_bouncer_type: nftables
crowdsec_firewall_bouncer_version: 0.0.34
crowdsec_server_address: 172.31.0.2

# Sysctl
sysctl_unprivileged_bpf_enabled: false
sysctl_net_forwarding_enabled: true
sysctl_user_namespace_enabled: true
sysctl_icmp_echo_ignore_all_enabled: false

# PAM
pam_wheel_users: []

# Journald
journald_system_max_use: 3G
journald_system_keep_free: 5G
journald_system_max_file_size: 1G
journald_max_file_sec: 1month

# Systemd system.conf security settings (CIS Benchmark)
systemd_default_limit_core: 0
systemd_default_limit_nofile: 1024
systemd_default_limit_nproc: 64
systemd_default_tasks_max: 512
systemd_default_timeout_start_sec: "90s"
systemd_default_timeout_stop_sec: "90s"
systemd_default_restart_sec: "100ms"
systemd_default_standard_output: "journal"
systemd_default_standard_error: "journal"
systemd_default_cpu_accounting: "yes"
systemd_default_memory_accounting: "yes"
systemd_default_blockio_accounting: "yes"
systemd_default_ip_accounting: "yes"
systemd_default_oom_policy: "stop"

# Additional systemd parameters (commented out by default)
systemd_dump_core: ""
systemd_crash_change_vt: ""
systemd_cpu_affinity: ""
systemd_join_controllers: ""
systemd_runtime_watchdog_sec: ""
systemd_shutdown_watchdog_sec: ""

# SELinux
selinux_state: permissive
selinux_policy: targeted
selinux_booleans:
  - { name: 'httpd_can_network_connect', state: 'off' }
  - { name: 'ssh_sysadm_login', state: 'on' }
selinux_fcontexts: []
selinux_ports:
  - { ports: "{{ sshd_port }}", proto: 'tcp', setype: 'ssh_port_t' }

# Auditd rules
auditd_rules:
  - "-w /etc/passwd -p wa -k identity"
  - "-w /etc/group -p wa -k identity"
  - "-w /etc/shadow -p wa -k identity"
  - "-w /etc/sudoers -p wa -k sudoers"
  - "-w /var/log/auth.log -p wa -k authlog"
  - "-w /etc/ssh/sshd_config -p wa -k sshd"
  - "-a always,exit -F arch=b64 -S chmod -S fchmod -S fchmodat -F auid>=1000 -F auid!=4294967295 -k perm_mod"
  - "-a always,exit -F arch=b64 -S chown -S fchown -S fchownat -S lchown -F auid>=1000 -F auid!=4294967295 -k perm_mod"

auditd_log_file: /var/log/audit/audit.log
auditd_max_log_file: 50
auditd_num_logs: 5
auditd_flush: incremental
auditd_freq: 20
auditd_max_log_file_action: keep_logs # rotate
auditd_space_left_action: suspend # syslog
auditd_admin_space_left_action: single # suspend
auditd_disk_full_action: single # suspend
auditd_disk_error_action: single # suspend

# NFTables advanced configuration
nftables_allowed_tcp_dports:
  - "{{  sshd_port }}"
nftables_allowed_udp_dports: []
